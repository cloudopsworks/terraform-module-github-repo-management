description: |-
  Terraform module for creating and standardizing GitHub repositories from CloudOpsWorks language templates. It
  provisions repositories, selects the correct template, renders CloudOpsWorks CI/CD configuration, and supports
  repository access, branch-protection ownership, build, code-quality, dependency, and deployment settings from a
  single Terragrunt inputs file.

# Introduction to the project
introduction: |-
  This module manages GitHub repositories as repeatable infrastructure. Operators provide a list of repository
  definitions, and the module:

  - creates each GitHub repository from a selected language or platform template;
  - supports explicit repository names or environment-derived names using `prefix_name`;
  - writes CloudOpsWorks CI/CD configuration to `.cloudopsworks/cloudopsworks-ci.yaml` by default;
  - supports legacy `.github/cloudopsworks-ci.yaml` placement with `blueprint: "v5.9"`;
  - renders contributor, reviewer, owner, build, SonarQube, Dependency-Track, and CD settings into the template;
  - renders branch-protection, commit-message enforcement, and Git workflow (GitFlow / GitHubFlow) settings with
    sensible defaults that each repository entry can override;
  - includes Flutter / fluttermobile repository template support alongside the existing language templates.

  Supported `language` values are `androidsdk`, `docker`, `dotnet`, `fluttermobile`, `flutter`, `go`, `java`,
  `kotlin`, `node`, `python`, `ruby`, `rust`, `terraform`, `terraform-module`, and `xcode`.

# How to use this project
usage: |-
  Bootstrap a deployment with Terragrunt scaffold. Scaffold writes `terragrunt.hcl`, `inputs.yaml`, and
  `local-tags.json` into the current directory, so create and enter the target directory first.

  ```sh
  # 1. Create and enter the target deployment directory
  mkdir -p prod/us-east-1/core/github-repos
  cd prod/us-east-1/core/github-repos

  # 2. Scaffold the module (do NOT use --working-dir)
  terragrunt scaffold github.com/cloudopsworks/terraform-module-github-repo-management

  # 3. Edit inputs.yaml with deployment-specific values
  #    (all keys and comments are pre-populated from .boilerplate/inputs.yaml)
  vi inputs.yaml

  # 4. Apply
  terragrunt apply
  ```

  Generated `inputs.yaml` example:

  ```yaml
  # GitHub provider configuration
  github:
    org: "my-github-org" # (Required) GitHub organization name. Used to configure the GitHub Terraform provider owner.

  # Module configuration
  repositories: [] # (Optional) Repository specifications to create and configure. Default: []. Uncomment and edit the example below.
  #  - name: "sample-api" # (Required) Repository name when prefix_name is not used.
  #    prefix_name: "sample" # (Optional) Prefix used to generate "<prefix>-<org_unit>-<environment>-<type>" repository names. Default: null.
  #    description: "Sample API repository" # (Optional) GitHub repository description. Default: "".
  #    language: "java" # (Required) Template language. Valid values: androidsdk, docker, dotnet, fluttermobile, flutter, go, java, kotlin, node, python, ruby, rust, terraform, terraform-module, xcode.
  #    public: false # (Optional) Set true for a public repository; false creates a private repository. Default: false.
  #    include_all_branches: false # (Optional) Copy every branch from the template repository. Default: false.
  #    model_repository: "cloudopsworks/java-app-template" # (Optional) Override template repository as "owner/name". Default: selected by language.
  #    blueprint: "v5.10" # (Optional) Blueprint generation path. Valid values: v5.9 writes .github/cloudopsworks-ci.yaml; v5.10 writes .cloudopsworks/cloudopsworks-ci.yaml. Default: v5.10.
  #    overwrite_on_create: true # (Optional) Replace an existing CI/CD config file during initial repository creation. Default: true.
  #    cicd_config: # (Optional) Values rendered into the language CI/CD template. Default: {}.
  #      access: # (Optional) Branch-protection reviewers and owners. Default: no reviewers or owners.
  #        reviewers: # (Optional) GitHub users or teams required for review, teams as org/team-slug. Default: [].
  #          - "cloudopsworks/engineering"
  #        owners: # (Optional) GitHub users or teams allowed to administer protected branches. Default: [].
  #          - "cloudopsworks/admin"
  #      contributors: # (Optional) Repository collaborators and team permissions. Default: no contributors.
  #        admin: [] # (Optional) Users or teams with admin permission. Default: [].
  #        maintain: [] # (Optional) Users or teams with maintain permission. Default: [].
  #        push: # (Optional) Users or teams with push permission. Default: [].
  #          - "cloudopsworks/engineering"
  #        triage: [] # (Optional) Users or teams with triage permission. Default: [].
  #        pull: [] # (Optional) Users or teams with pull permission. Default: [].
  #      build: # (Optional) Language build settings consumed by selected templates. Default: {}.
  #        version: "17" # (Optional) Runtime, SDK, or toolchain version. Default: template-specific.
  #        dist: "temurin" # (Optional) Runtime distribution when supported. Default: template-specific.
  #      sonarqube: # (Optional) SonarQube integration settings. Default: enabled by template.
  #        disabled: false # (Optional) Disable SonarQube when true. Default: false.
  #      branch: # (Optional) Branch-protection rendering settings. Default: protection enabled, Conventional Commits validation disabled.
  #        protectionEnabled: true # (Optional) Render branch-protection configuration into the CI/CD config. Default: true.
  #        conventionalCommitsEnabled: false # (Optional) Enable Conventional Commits message validation on protected branches. Default: false.
  #        conventionalCommitsPattern: "^(build|ci|chore|docs|feat|fix|perf|refactor|revert|style|test)(\\([a-z0-9\\-]+\\))?: .+" # (Optional) Regex used to validate Conventional Commits messages. Default: shown value.
  #      enforce: # (Optional) Commit-message enforcement settings rendered into the CI/CD config. Default: enforcement disabled.
  #        conventionalCommitsEnforced: false # (Optional) Enforce (block) commits that do not match the Conventional Commits pattern when true. Default: false.
  #        customCommitsPatternEnabled: false # (Optional) Enforce a custom commit-message pattern when true. Default: false.
  #        customCommitsPattern: "PROJECT-[0-9]+.+" # (Optional) Regex used to validate custom commit messages, e.g. requiring an issue key. Default: shown value.
  #      dependency_track: # (Optional) Dependency-Track integration settings. Default: enabled by template.
  #        disabled: false # (Optional) Disable Dependency-Track when true. Default: false.
  #        type: "Application" # (Optional) Project classifier. Valid values: Application, Library. Default: Application.
  #      cd: # (Optional) Continuous-delivery settings rendered into the CI/CD config. Default: automatic disabled.
  #        automatic: false # (Optional) Enable automatic continuous deployment. Default: false.
  #        cloud: "aws" # (Optional) Deployment cloud. Valid values depend on template; common values: aws, azure, gcp. Default: unset.
  #        cloud_type: "eks" # (Optional) Deployment target type such as eks, lambda, elasticbeanstalk, aks, webapp, function, gke. Default: unset.
  #      gitflow: # (Optional) Git workflow settings rendered into the CI/CD config. Default: GitFlow enabled.
  #        enabled: true # (Optional) Use GitFlow branching when true; false selects GitHubFlow (also controls the generated gitversion.yaml). Default: true.
  #        supportBranchesEnabled: false # (Optional) Enable support/* branch handling. Default: false.
  #        requiredReviewers: 1 # (Optional) Number of required pull-request reviewers. Default: 1.
  ```

  Generated `terragrunt.hcl` shape:

  ```hcl
  locals {
    local_vars  = yamldecode(file("./inputs.yaml"))
    spoke_vars  = yamldecode(file(find_in_parent_folders("spoke-inputs.yaml")))
    region_vars = yamldecode(file(find_in_parent_folders("region-inputs.yaml")))
    env_vars    = yamldecode(file(find_in_parent_folders("env-inputs.yaml")))
    global_vars = yamldecode(file(find_in_parent_folders("global-inputs.yaml")))

    local_tags  = jsondecode(file("./local-tags.json"))
    spoke_tags  = jsondecode(file(find_in_parent_folders("spoke-tags.json")))
    region_tags = jsondecode(file(find_in_parent_folders("region-tags.json")))
    env_tags    = jsondecode(file(find_in_parent_folders("env-tags.json")))
    global_tags = jsondecode(file(find_in_parent_folders("global-tags.json")))

    tags = merge(
      local.global_tags,
      local.env_tags,
      local.region_tags,
      local.spoke_tags,
      local.local_tags
    )
  }

  include "root" {
    path = find_in_parent_folders("root.hcl")
  }

  # Generates the GitHub provider block using github.org from inputs.yaml (Required)
  generate "provider_github" {
    path      = "provider.l.tf"
    if_exists = "overwrite_terragrunt"
    contents  = <<EOF
  provider "github" {
    owner = "${local.local_vars.github.org}"
  }
  EOF
  }

  terraform {
    source = "github.com/cloudopsworks/terraform-module-github-repo-management"
  }

  inputs = {
    is_hub     = false
    org        = local.env_vars.org
    spoke_def  = local.spoke_vars.spoke
    repositories = local.local_vars.repositories
    extra_tags = local.tags
  }
  ```

# Example usage
examples: |-
  Manage a mixed set of service, infrastructure, and mobile repositories from one deployment:

  ```yaml
  repositories:
    - name: "payments-api"
      description: "Payments Java service"
      language: "java"
      public: false
      include_all_branches: false
      blueprint: "v5.10"
      cicd_config:
        access:
          reviewers:
            - "cloudopsworks/engineering"
          owners:
            - "cloudopsworks/admin"
        contributors:
          push:
            - "cloudopsworks/engineering"
        build:
          version: "21"
          dist: "temurin"
        sonarqube:
          disabled: false
        branch:
          protectionEnabled: true
          conventionalCommitsEnabled: true
        enforce:
          conventionalCommitsEnforced: false
        dependency_track:
          disabled: false
          type: "Application"
        cd:
          cloud: "aws"
          cloud_type: "eks"
        gitflow:
          enabled: true
          requiredReviewers: 2

    - name: "mobile-wallet"
      description: "Flutter mobile application"
      language: "flutter"
      public: false
      blueprint: "v5.10"
      cicd_config:
        access:
          reviewers:
            - "cloudopsworks/mobile"
          owners:
            - "cloudopsworks/admin"
        contributors:
          push:
            - "cloudopsworks/mobile"
        build:
          version: "3.24"
        dependency_track:
          disabled: false
          type: "Application"

    - prefix_name: "platform"
      description: "Environment-scoped Terraform project repository"
      language: "terraform"
      public: false
      include_all_branches: true
      cicd_config:
        access:
          reviewers:
            - "cloudopsworks/devops"
          owners:
            - "cloudopsworks/admin"
  ```

  Notes:

  - `name` creates a repository with the exact provided name.
  - `prefix_name` creates a repository named `<prefix_name>-<organization_unit>-<environment_name>-<environment_type>`.
  - `model_repository` overrides the default CloudOpsWorks template selected by `language`.
  - `terraform-module` creates the repository from the module template but does not write a CI/CD config file.
  - `blueprint: "v5.10"` writes `.cloudopsworks/cloudopsworks-ci.yaml`; `blueprint: "v5.9"` writes `.github/cloudopsworks-ci.yaml`.

# How to get started quickly
quickstart: |-
  1. Export a GitHub token with permissions to create repositories and write repository files:
     ```bash
     export GITHUB_TOKEN="<github-token>"
     ```

  2. Scaffold a deployment directory:
     ```bash
     mkdir -p prod/us-east-1/core/github-repos
     cd prod/us-east-1/core/github-repos
     terragrunt scaffold github.com/cloudopsworks/terraform-module-github-repo-management
     ```

  3. Edit `inputs.yaml`: set `github.org` to your GitHub organization name (required for the provider block), then add at least one repository entry under `repositories`.

  4. Preview and apply:
     ```bash
     terragrunt plan
     terragrunt apply
     ```

